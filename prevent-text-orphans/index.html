<!DOCTYPE HTML>
<html lang="en-US">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Prevent Text Orphans</title>
	<link rel="stylesheet" href="css/bootstrap.min.css" />
	<script src="lib/bootstrap.min.js"></script>
	<script src="lib/jquery.min.js"></script>
	<script src="lib/jquery.preventTextOrphans.js"></script>
	<script>
		$(document).ready(function() {
			$(".enable-pto").preventTextOrphans();
			$(".enable-pto.minimum").preventTextOrphans({ minimum: 3 });
		});
	</script>
</head>
<body>
	<nav class="navbar bg-dark shadow-sm">
		<div class="container">
			<div class="navbar-brand text-white">Prevent Text Orphans Demo</a>
		</div>
	</nav>
	<div class="py-5">
		<div class="container">
			<div class="row g-3">
				<div class="col">
					<div class="card h-100">
						<div class="card-body">
							<div class="card-title mb-0 text-muted">Default Text</div>
							<h2 class="mb-0">Let Us Know What You Think</h2>
						</div>
					</div>
				</div>
				<div class="col">
					<div class="card h-100">
						<div class="card-body">
							<div class="card-title mb-0 text-muted">With <code>preventTextOrphans()</code> enabled, default options:</div>
							<h2 class="mb-0 enable-pto">Let Us Know What You Think</h2>
						</div>
					</div>
				</div>
				<div class="col">
					<div class="card h-100">
						<div class="card-body">
							<div class="card-title mb-0 text-muted">With <code>preventTextOrphans()</code> enabled, passing <code>{ minimum: 3 }</code>:</div>
							<h2 class="mb-0 enable-pto minimum">Let Us Know What You Think</h2>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
